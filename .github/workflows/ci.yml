name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: endulus
          POSTGRES_PASSWORD: endulus_ci_pw
          POSTGRES_DB: endulus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U endulus -d endulus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://endulus:endulus_ci_pw@localhost:5432/endulus?schema=public
      JWT_ACCESS_SECRET: ci_test_access_secret_padded_for_min_length_xxx
      JWT_REFRESH_SECRET: ci_test_refresh_secret_padded_for_min_length_yyy
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx prisma migrate deploy
      - run: npm test

  frontend-build:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run lint --if-present
      - run: npm run build
        env:
          VITE_API_BASE_URL: /api

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          tags: |
            endulus-travel-backend:ci
            endulus-travel-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            endulus-travel-frontend:ci
            endulus-travel-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=/api

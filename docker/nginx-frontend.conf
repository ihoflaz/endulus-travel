upstream backend_upstream {
    server backend:4000;
}

# If the edge nginx already populated X-Forwarded-Proto, honor it; otherwise
# fall back to our own scheme (http for direct dev access on :8080).
map $http_x_forwarded_proto $effective_proto {
    default     $http_x_forwarded_proto;
    ''          $scheme;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    # Baseline security headers — edge nginx adds HSTS on top.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # API + dynamic data + uploads proxy to backend container.
    # ^~ ensures these prefix locations beat the regex matchers below.
    location ^~ /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_proto;
        proxy_set_header X-Forwarded-Host $host;
    }
    location ^~ /data/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_proto;
    }
    location ^~ /uploads/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_proto;
    }

    # Cache hashed static assets aggressively (Vite outputs hashed filenames)
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location ~* \.(?:jpg|jpeg|png|gif|svg|webp|avif|ico|woff|woff2)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # index.html must never be cached — it references the hashed bundles, so a
    # stale copy pins old JS/CSS and users never see new deploys. (SPA-fallback
    # routes internally redirect here and inherit these headers.)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SPA fallback — any unknown route falls through to index.html
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}

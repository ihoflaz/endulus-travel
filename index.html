<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon ve Icon Tanımlamaları -->
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/favicon/site.webmanifest" />

    <!-- Fonts: Fraunces (cinematic display serif) + Inter (UI sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600;700&display=swap"

    />

    <!-- Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Endülüs Travel — iki kız kardeşin kurduğu; namaz vakitlerine uygun, helal mutfaklı, 15-20 kişilik butik turlar. Aileler ve hanımlar için huzurlu bir yol arkadaşlığı." />
    <meta name="keywords" content="endülüs travel, butik turlar, 15-20 kişilik gruplar, namaz vakitlerine uygun tur, helal tur, aile turları, kadın grupları, Mısır turu, Fas turu, Özbekistan turu" />

         backend OG renderer; this is the homepage / fallback card. -->
    <meta property="og:site_name" content="Endülüs Travel" />
    <meta property="og:title" content="Endülüs Travel — Hassasiyetinizle Kadim Diyarlara" />
    <meta property="og:description" content="İki kız kardeşin kurduğu; namaz vakitlerine uygun, helal mutfaklı, 15-20 kişilik butik turlar. Aileler ve hanımlar için huzurlu bir yol arkadaşlığı." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:url" content="https://endulustravel.com" />
    <meta property="og:image" content="https://endulustravel.com/uploads/media/og-default.jpg" />
    <meta property="og:image:secure_url" content="https://endulustravel.com/uploads/media/og-default.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
